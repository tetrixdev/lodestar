# Dev-only Vite HMR proxy — exposes the Vite dev server under a separate hostname
# (lodestar-vite.jj.tetrix.dev) without putting the php container on the shared
# main-network. The default server block keeps handling the Laravel app for the
# main hostname; requests matching this Host header forward to php:5173 (the Vite
# dev server on the project's internal network). Mounted into dev-nginx via
# compose.override.yml.
server {
    listen 80;
    server_name lodestar-vite.jj.tetrix.dev;

    location / {
        proxy_pass http://php:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Vite HMR uses a WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Long timeout for the HMR persistent connection
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
